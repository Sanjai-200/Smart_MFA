<!DOCTYPE html>
<html>
<head>
<title>OTP Verification</title>

<style>
body {
  background: #0f172a;
  color: white;
  text-align: center;
  font-family: Arial;
}

.box {
  background: #1e293b;
  padding: 25px;
  border-radius: 10px;
  margin-top: 80px;
  display: inline-block;
  width: 300px;
}

input {
  padding: 10px;
  margin: 10px 0;
  width: 90%;
  border-radius: 5px;
  border: none;
}

button {
  padding: 10px;
  width: 95%;
  border: none;
  border-radius: 5px;
  margin-top: 10px;
  font-size: 14px;
  cursor: pointer;
}

.verify-btn {
  background: #22c55e;
  color: white;
}

.resend-btn {
  background: #3b82f6;
  color: white;
}

#msg {
  margin-top: 10px;
}
</style>

</head>
<body>

<div class="box">

<h2>OTP Verification</h2>

<input id="otpInput" placeholder="Enter OTP">

<button class="verify-btn" id="verifyBtn">
  Verify OTP
</button>

<button class="resend-btn" id="resendBtn">
  Resend OTP
</button>

<p id="msg"></p>

</div>

<!-- ✅ MODULE SCRIPT -->
<script type="module" src="/static/otp.js"></script>

</body>
</html>
